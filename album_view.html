<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álbum San Carlos – Ver Progreso</title>
<style>
:root{--rojo:#e4051f;--azul:#00476c;--dorado:#f0c040;--negro:#111;--blanco:#fff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Arial Black',Arial,sans-serif;background:#0c1f32;color:#fff;min-height:100vh;}
.hdr{background:linear-gradient(90deg,var(--azul),#001f33);padding:.9rem 1rem;display:flex;align-items:center;gap:.8rem;position:sticky;top:0;z-index:10;box-shadow:0 3px 20px rgba(0,0,0,.6);}
.hdr-logo{width:44px;height:44px;border-radius:50%;overflow:hidden;flex-shrink:0;}
.hdr-logo img{width:100%;height:100%;object-fit:cover;}
.hdr-info{flex:1}
.hdr-info h1{font-size:1rem;color:var(--dorado);}
.hdr-info p{font-size:.65rem;color:rgba(255,255,255,.5);}
.content{padding:1rem;max-width:680px;margin:0 auto;}
.sel-row{display:flex;gap:.6rem;margin-bottom:1rem;}
select{flex:1;padding:.8rem;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:#001f33;color:#fff;font-family:inherit;font-size:.9rem;outline:none;-webkit-appearance:none;}
select option,select optgroup{background:#001f33;color:#fff;}
.btn{background:linear-gradient(135deg,var(--dorado),#c8922a);color:#000;border:none;padding:.8rem 1.2rem;border-radius:10px;font-size:.9rem;font-weight:900;cursor:pointer;}
.btn:hover{transform:scale(1.03);}
.stat-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:1rem;text-align:center;margin-bottom:1rem;}
.stat-card .curso{font-size:1.2rem;font-weight:900;color:var(--dorado);}
.stat-card .sub{font-size:.8rem;color:rgba(255,255,255,.55);margin:.2rem 0;}
.progbar{background:rgba(255,255,255,.1);border-radius:20px;height:10px;overflow:hidden;margin:.5rem 0;}
.progfill{height:100%;background:linear-gradient(90deg,var(--dorado),var(--rojo));border-radius:20px;transition:width 1s;}
.pct{font-size:1.4rem;font-weight:900;color:var(--dorado);}
.flag-box{width:48px;height:32px;border-radius:4px;overflow:hidden;margin:0 auto .3rem;}
.flag-box img{width:100%;height:100%;object-fit:cover;}
.vpais-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.6rem;margin-top:.8rem;}
.vpais{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:.7rem;text-align:center;cursor:pointer;transition:.2s;}
.vpais:hover{border-color:var(--dorado);transform:translateY(-2px);}
.fgrid{display:grid;gap:.3rem;}
.fig{background:#13132a;border:1px solid rgba(255,255,255,.1);border-radius:4px;position:relative;overflow:hidden;aspect-ratio:3/4;cursor:pointer;}
.fig.peg{border-color:var(--dorado);background:rgba(240,192,64,.08);}
.fig.holo{border-color:var(--dorado);}
.fav{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:.7rem;overflow:hidden;}
.ftxt{width:100%;text-align:center;margin-top:.15rem;}
.fnum{font-size:.42rem;color:var(--dorado);background:rgba(0,71,108,.8);padding:0px 3px;border-radius:2px;display:inline-block;margin-bottom:.05rem;}
.fnm{font-size:.48rem;font-weight:700;line-height:1.1;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.fvac{font-size:1.3rem;opacity:.18;}
.bbtn{background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.7);padding:.45rem .9rem;border-radius:8px;cursor:pointer;font-size:.78rem;margin-bottom:.8rem;display:inline-flex;align-items:center;gap:.3rem;font-family:inherit;}
.bbtn:hover{background:rgba(255,255,255,.14);}
#zoom-ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:400;align-items:center;justify-content:center;flex-direction:column;padding:1rem;}
#zoom-ovl.open{display:flex;}
#zoom-ovl img{max-width:92vw;max-height:80vh;border-radius:15px;object-fit:contain;box-shadow:0 0 80px rgba(240,192,64,.25);}
.zoom-close{position:absolute;top:.7rem;right:.7rem;background:rgba(255,255,255,.12);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:1.2rem;cursor:pointer;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--dorado);border-radius:3px;}
</style>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

</head>

let VPEG=new Set();

function flagImg(p,w){return`<img src="https://flagcdn.com/w${w||80}/${p.fcd}.png" style="width:100%;height:100%;object-fit:cover" alt="${p.n}" onerror="this.style.display='none'">`;}

// Verificar URL para auto-cargar
window.addEventListener('DOMContentLoaded',()=>{
  const params=new URLSearchParams(window.location.search);
  const curso=params.get('curso');
  if(curso){
    document.getElementById('vsel').value=curso;
    cargarVista();
  }
});

async function cargarVista(){
  const cc=document.getElementById('vsel').value;
  if(!cc){alert('Elegí un curso');return;}
  const[g,d]=cc.split('-');
  const lbl=`${g}° ${DN[d]||d}`;
  document.getElementById('vresult').innerHTML=`<p style="text-align:center;color:rgba(255,255,255,.5);padding:2rem">☁️ Cargando ${lbl}...</p>`;
  // Actualizar URL para compartir
  const url=new URL(window.location);
  url.searchParams.set('curso',cc);
  history.replaceState(null,'',url);

  VPEG=new Set();
  if(fbDB){
    try{const snap=await fbDB.ref(`albums/${cc}`).get();if(snap.exists())VPEG=new Set(snap.val().peg||[]);}catch(e){}
  }
  const pegCount=VPEG.size;
  const pct=Math.round(pegCount/TOTAL*100);
  let html=`
    <div class="stat-card">
      <div class="curso">${lbl.toUpperCase()}</div>
      <div class="sub">${pegCount} de ${TOTAL} figuritas pegadas</div>
      <div class="progbar"><div class="progfill" style="width:${pct}%"></div></div>
      <div class="pct">${pct}%</div>
    </div>
    <div id="vpaisdetalle"></div>
    <div class="vpais-grid">`;
  PAISES.forEach(p=>{
    const fs=FPP[p.id];const pg=fs.filter(f=>VPEG.has(f.id)).length;const t2=fs.length;const p2=Math.round(pg/t2*100);
    html+=`<div class="vpais" onclick="verVistaPais('${p.id}')">
      <div class="flag-box">${flagImg(p,80)}</div>
      <div style="font-size:.75rem;font-weight:900;margin:.15rem 0">${p.n}</div>
      <div style="font-size:.58rem;color:rgba(255,255,255,.45)">${pg}/${t2} · ${p2}%</div>
      <div style="height:4px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin-top:.3rem">
        <div style="width:${p2}%;height:100%;background:var(--dorado);border-radius:4px"></div>
      </div>
    </div>`;
  });
  // Especiales
  const espPeg=ECOLE.filter(f=>VPEG.has(f.id)).length;
  const esp2=Math.round(espPeg/ECOLE.length*100);
  html+=`<div class="vpais" onclick="verVistaEsp()">
    <div style="font-size:1.4rem;margin:.2rem 0">⭐</div>
    <div style="font-size:.75rem;font-weight:900;margin:.15rem 0">Especiales</div>
    <div style="font-size:.58rem;color:rgba(255,255,255,.45)">${espPeg}/${ECOLE.length} · ${esp2}%</div>
    <div style="height:4px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin-top:.3rem">
      <div style="width:${esp2}%;height:100%;background:var(--dorado);border-radius:4px"></div>
    </div>
  </div>`;
  html+=`</div>`;
  document.getElementById('vresult').innerHTML=html;
}

function rfigV(f){
  const pg=VPEG.has(f.id);
  let avContent=pg&&f.img
    ?`<img src="${f.img}" style="width:100%;height:100%;object-fit:cover" loading="lazy" onclick="showZoom('${f.img}')">`
    :`<div style="display:flex;align-items:center;justify-content:center;height:100%"><div class="fvac">❓</div></div>`;
  return`<div class="fig ${pg?'peg':''} ${f.holo?'holo':''}" style="cursor:${pg&&f.img?'pointer':'default'}" ${pg&&f.img?`onclick="showZoom('${f.img}')"`:''}>${avContent}</div>`;
}

function verVistaPais(id){
  const p=PAISES.find(x=>x.id===id);const fs=FPP[id];
  const pg=fs.filter(f=>VPEG.has(f.id)).length;
  document.getElementById('vpaisdetalle').innerHTML=`
    <div style="margin-bottom:.8rem">
      <button class="bbtn" onclick="document.getElementById('vpaisdetalle').innerHTML=''">← Países</button>
      <div style="font-size:1rem;font-weight:900;color:var(--dorado);margin:.4rem 0">${p.n} · ${pg}/${fs.length} pegadas</div>
      <div class="fgrid" style="grid-template-columns:repeat(8,1fr)">${fs.map(f=>rfigV(f)).join('')}</div>
    </div>`;
  document.getElementById('vpaisdetalle').scrollIntoView({behavior:'smooth',block:'start'});
}

function verVistaEsp(){
  const pg=ECOLE.filter(f=>VPEG.has(f.id)).length;
  document.getElementById('vpaisdetalle').innerHTML=`
    <div style="margin-bottom:.8rem">
      <button class="bbtn" onclick="document.getElementById('vpaisdetalle').innerHTML=''">← Volver</button>
      <div style="font-size:1rem;font-weight:900;color:var(--dorado);margin:.4rem 0">⭐ Figuritas Especiales · ${pg}/${ECOLE.length}</div>
      <div class="fgrid" style="grid-template-columns:repeat(6,1fr)">${ECOLE.map(f=>rfigV({...f,num:f.id,nm:f.nombre})).join('')}</div>
    </div>`;
  document.getElementById('vpaisdetalle').scrollIntoView({behavior:'smooth',block:'start'});
}

function showZoom(src){
  document.getElementById('zoom-img').src=src;
  document.getElementById('zoom-ovl').classList.add('open');
}
function closeZoom(){document.getElementById('zoom-ovl').classList.remove('open');}
</script>
</body>
</html>
